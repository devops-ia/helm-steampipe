name: Release Helm Chart (single)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/steampipe/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get chart version from Chart.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' charts/steampipe/Chart.yaml | awk '{print $2}')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

  create-tag:
    needs: get-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Create version tag if it does not exist
        id: tag
        env:
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: [get-version, create-tag]
    if: needs.create-tag.outputs.created == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
    uses: devops-ia/.github/.github/workflows/helm-release.yml@main
    with:
      chart_name: steampipe
      charts_dir: charts
      tag: ${{ needs.get-version.outputs.tag }}
