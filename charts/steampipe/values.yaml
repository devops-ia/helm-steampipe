# Default values for steampipe.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
---
# -- Number of replicas
replicaCount: 1

# -- Image registry
image:
  repository: ghcr.io/turbot/steampipe
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Registry secret names as an array
imagePullSecrets: []

# -- String to partially override steampipe.fullname template (will maintain the release name)
nameOverride: ""

# -- String to fully override steampipe.fullname template
fullnameOverride: ""

# -- Enable creation of ServiceAccount
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Specifies if you don't want the kubelet to automatically mount
  # a ServiceAccount's API credentials
  automountServiceAccountToken: false

# -- Pod annotations
podAnnotations: {}

# -- Deployment annotations
deploymentAnnotations: {}

# -- Privilege and access control settings for a Pod or Container
# Steampipe runs as UID=9193, GID=0 (root group for OpenShift compatibility)
podSecurityContext:
  fsGroup: 9193
  runAsGroup: 0
  runAsUser: 9193

# -- Privilege and access control settings
securityContext:
  runAsNonRoot: true
  runAsUser: 9193

# -- Command for Pod
command: []
#  - "steampipe"
#  - "service"
#  - "start"
#  - "--foreground"
#  - "--show-password"
#  - "--database-password=1234"

# -- Arguments for Pod
# Only --foreground is required. Use STEAMPIPE_DATABASE_PASSWORD env var (via a
# Kubernetes Secret) to set a stable password instead of relying on the random one.
args:
  - "--foreground"

# -- Environment variables to configure application
# STEAMPIPE_UPDATE_CHECK and STEAMPIPE_TELEMETRY are recommended for Kubernetes deployments
# Ref: https://steampipe.io/docs/reference/env-vars/overview
env:
  - name: STEAMPIPE_UPDATE_CHECK
    value: "false"
  - name: STEAMPIPE_TELEMETRY
    value: "none"

# -- Variables from file
envFrom: []

# -- Configure liveness
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-startup-probes
livenessProbe: {}
#  httpGet:
#    path: '/health/live'
#    port: http
#  initialDelaySeconds: 0
#  timeoutSeconds: 5

# -- Configure readinessProbe
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-startup-probes
readinessProbe: {}
#  httpGet:
#    path: '/health/ready'
#    port: http
#  initialDelaySeconds: 10
#  timeoutSeconds: 1

# -- Configure startupProbe
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-startup-probes
startupProbe: {}
#  httpGet:
#    path: '/health'
#    port: http
#  initialDelaySeconds: 15
#  timeoutSeconds: 1
#  failureThreshold: 60
#  periodSeconds: 5

# -- Configure BBDD (database) endpoint for Steampipe
# When enabled, creates a ClusterIP service on the PostgreSQL port (9193) so
# other pods can connect using any PostgreSQL-compatible client.
bbdd:
  enabled: false
  svcAnnotations: {}
  #  service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  #  external-dns.alpha.kubernetes.io/hostname:
  port: 9193
  listen: "network"
  # -- Service type for the bbdd service. ClusterIP is recommended for internal
  # access; use LoadBalancer or NodePort only if external access is required.
  serviceType: ClusterIP

# -- Dashboard section is DEPRECATED in Steampipe v2.x
# The built-in dashboard feature was moved to Powerpipe (https://powerpipe.io).
# This section is retained for reference only and has no effect on v2.x deployments.
# @ignored
dashboard:
  enabled: false
  svcAnnotations: {}
  port: 9194
  listen: "network"

# -- Ingress configuration to expose app
# ⚠️  WARNING: Steampipe exposes a PostgreSQL endpoint (TCP), NOT HTTP.
# Standard Kubernetes Ingress operates at L7 (HTTP/HTTPS) and will NOT work
# for PostgreSQL connections. You need a TCP-capable Ingress controller:
#   - NGINX: use TCP services ConfigMap (https://kubernetes.github.io/ingress-nginx/user-guide/exposing-tcp-udp-services/)
#   - Traefik: use IngressRouteTCP CRD
#   - HAProxy: supports TCP mode natively
# For most use cases, a ClusterIP or LoadBalancer service (bbdd.serviceType) is simpler.
ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          port: 9193
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- The resources limits and requested
resources:
  {}
  #  We usually recommend not to specify default resources and to leave this as a conscious
  #  choice for the user. This also increases chances charts run on environments with little
  #  resources, such as Minikube. If you do want to specify resources, uncomment the following
  #  lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  #  limits:
  #    cpu: 100m
  #    memory: 128Mi
  #  requests:
  #    cpu: 100m
  #    memory: 128Mi

# -- Node labels for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: []

# -- Affinity for pod assignment
affinity: {}

# -- Reference volumes
extraVolumes: []
#  - name: openshift-connection
#    configMap:
#      name: openshift-connection
#  - name: openshift-kubeconfig
#    secret:
#      secretName: openshift-kubeconfig
#  - name: azure-connection
#    secret:
#      secretName: azure-connection

# -- Mount extra volumes
extraVolumeMount: []
#  - name: openshift-connection
#    mountPath: "/home/steampipe/.steampipe/config/openshift.spc"
#    subPath: openshift.spc
#    readOnly: true
#  - name: openshift-kubeconfig
#    mountPath: "/home/steampipe/.kube/config"
#    subPath: config
#    readOnly: true
#  - name: azure-connection
#    mountPath: "/home/steampipe/.steampipe/config/azure.spc"
#    readOnly: true
#    subPath: azure.spc

# -- Extra configuration for Steampipe
extraConfig:
  configMaps:
    enabled: false
    config:
      - name: openshift-connection
        type: Opaque
        data:
          openshift.spc: |
            connection "openshift" {
              plugin      = "openshift"
              config_path = "~/.kube/config"
            }

  secrets:
    enabled: false
    config:
      - name: azure-connection
        type: Opaque
        data:
          azure.spc: |
            connection "azure" {
              plugin          = "azure"
              environment     = "AZUREPUBLICCLOUD"
              tenant_id       = "00000000-0000-0000-0000-000000000000"
              subscription_id = "00000000-0000-0000-0000-000000000000"
              client_id       = "00000000-0000-0000-0000-000000000000"
              client_secret   = "~dummy@3password"
            }
      - name: openshift-kubeconfig
        type: Opaque
        data:
          config: |
            current-context: federal-context
            apiVersion: v1
            clusters:
            - cluster:
                certificate-authority: path/to/my/cafile
                server: https://horse.org:4443
              name: horse-cluster
            contexts:
            - context:
                cluster: horse-cluster
                namespace: chisel-ns
                user: green-user
              name: federal-context
            kind: Config
            users:
            - name: green-user
              user:
                client-certificate: path/to/my/client/cert
                client-key: path/to/my/client/key

# -- Configure initContainers
# The init container installs Steampipe plugins before the main container starts.
# It uses the same image (repository + tag) as the main container to ensure CLI compatibility.
# The pullPolicy can be set independently (e.g., Always for init, IfNotPresent for main).
initContainer:
  image:
    repository: ghcr.io/turbot/steampipe
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  securityContext:
    runAsNonRoot: true
    runAsUser: 9193

  # -- Configure Steampipe plugins
  # Ref: https://hub.steampipe.io/plugins
  plugins: []
  # - "azure"
  # - "azuread"
  # - "openshift"
  # - "terraform"

  # -- @deprecated mods are no longer managed by Steampipe v2.
  # Use Powerpipe (https://powerpipe.io) to install and run mods.
  # This field is kept for backwards compatibility but has no effect.
  mods: []

  # -- The resources limits and requested
  resources: {}
  # limits:
  #   cpu: "1500m"
  #   memory: 2048Mi
  # requests:
  #   cpu: 1
  #   memory: 256Mi

  extraInitVolumeMount: []

# -- Extra containers to add to the pod
extraContainers: []

# -- Extra Kubernetes manifests to deploy
extraObjects: []
# - apiVersion: batch/v1
#   kind: CronJob
#   metadata:
#     name: hello
#   spec:
#     schedule: "* * * * *"
#     jobTemplate:
#       spec:
#         template:
#           spec:
#             containers:
#             - name: hello
#               image: busybox:1.28
#               imagePullPolicy: IfNotPresent
#               command:
#               - /bin/sh
#               - -c
#               - date; echo Hello from the Kubernetes cluster
#             restartPolicy: OnFailure

# --  Deploys oauth2-proxy, a reverse proxy that provides authentication with Google, Github or other providers
oauth2Proxy:
  enabled: false

# -------------------------------------------------------------------
# Powerpipe — Dashboards, benchmarks, and compliance on top of Steampipe
# Ref: https://powerpipe.io
# Image: ghcr.io/turbot/powerpipe
# -------------------------------------------------------------------

# -- Enable deployment alongside Steampipe
# Powerpipe provides a web dashboard (HTTP) for running benchmarks and compliance checks.
# Requires bbdd.enabled=true (Powerpipe connects to Steampipe's PostgreSQL endpoint).
powerpipe:
  enabled: false

  # -- Powerpipe container image
  image:
    repository: ghcr.io/turbot/powerpipe
    pullPolicy: IfNotPresent
    tag: ""

  # -- Number of Powerpipe replicas
  replicaCount: 1

  # -- HTTP server port (default: 9033)
  port: 9033

  # -- Listen mode: "local" (localhost) or "network" (all interfaces)
  listen: "network"

  # -- Service type for the Powerpipe HTTP endpoint
  serviceType: ClusterIP

  # -- Powerpipe ServiceAccount override
  # By default Powerpipe reuses Steampipe's ServiceAccount.
  # Set a custom name if Powerpipe should NOT inherit Steampipe's cloud IAM credentials (IRSA, Workload Identity).
  serviceAccount:
    name: ""

  # -- Service annotations
  svcAnnotations: {}

  # -- Deployment annotations
  deploymentAnnotations: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Powerpipe mods to install (installed by init container)
  # Ref: https://hub.powerpipe.io/mods
  mods: []
  # - github.com/turbot/steampipe-mod-aws-compliance
  # - github.com/turbot/steampipe-mod-aws-well-architected
  # - github.com/turbot/steampipe-mod-kubernetes-compliance

  # -- Additional environment variables for Powerpipe
  # POWERPIPE_DATABASE is auto-configured to point to the Steampipe service.
  # Ref: https://powerpipe.io/docs/reference/env-vars
  env: []
  # - name: POWERPIPE_LOG_LEVEL
  #   value: "info"
  # - name: POWERPIPE_BENCHMARK_TIMEOUT
  #   value: "600"

  # -- Environment variable sources (ConfigMap/Secret references)
  envFrom: []

  # -- Powerpipe pod security context
  podSecurityContext: {}

  # -- Powerpipe container security context
  securityContext: {}

  # -- Powerpipe resource requests and limits
  resources: {}
  # limits:
  #   cpu: "1000m"
  #   memory: 1024Mi
  # requests:
  #   cpu: 500m
  #   memory: 512Mi

  # -- Powerpipe Ingress (HTTP — works with standard Ingress controllers)
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: powerpipe.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 9033
    tls: []
    #  - secretName: powerpipe-tls
    #    hosts:
    #      - powerpipe.example.com

  # -- Node selector for Powerpipe pods
  nodeSelector: {}

  # -- Tolerations for Powerpipe pods
  tolerations: []

  # -- Affinity rules for Powerpipe pods
  affinity: {}

  # -- Additional volume mounts for Powerpipe container
  extraVolumeMount: []

  # -- Additional volumes for Powerpipe pod
  extraVolumes: []

# --  Configuration for oauth2-proxy
# Ref: https://github.com/oauth2-proxy/manifests/tree/oauth2-proxy-7.7.9/helm/oauth2-proxy
oauth2-proxy:
  # -- Override the deployment namespace
  namespaceOverride: ""

  # -- Force the target Kubernetes version (it uses Helm `.Capabilities` if not set).
  # This is especially useful for `helm template` as capabilities are always empty
  # due to the fact that it doesn't query an actual cluster
  kubeVersion:

  # -- Oauth client configuration specifics
  config:
    # Add config annotations
    annotations: {}
    # OAuth client ID
    clientID: "XXXXXXX"
    # OAuth client secret
    clientSecret: "XXXXXXXX"
    # Create a new secret with the following command
    # openssl rand -base64 32 | head -c 32 | base64
    # Use an existing secret for OAuth2 credentials (see secret.yaml for required fields)
    # Example:
    # existingSecret: secret
    cookieSecret: "XXXXXXXXXXXXXXXX"
    # The name of the cookie that oauth2-proxy will create
    # If left empty, it will default to the release name
    cookieName: ""
    google:
      {}
      # adminEmail: xxxx
      # useApplicationDefaultCredentials: true
      # targetPrincipal: xxxx
      # serviceAccountJson: xxxx
      # Alternatively, use an existing secret (see google-secret.yaml for required fields)
      # Example:
      # existingSecret: google-secret
      # groups: []
      # Example:
      #  - group1@example.com
      #  - group2@example.com

    # -- Default configuration, to be overridden
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "file:///dev/null" ]
    # Custom configuration file: oauth2_proxy.cfg
    # configFile: |-
    #   pass_basic_auth = false
    #   pass_access_token = true
    # Use an existing config map (see configmap.yaml for required fields)
    # Example:
    # existingConfig: config

  # -- Enable alpha features
  alphaConfig:
    enabled: false
    # Add config annotations
    annotations: {}
    # Arbitrary configuration data to append to the server section
    serverConfigData: {}
    # Arbitrary configuration data to append to the metrics section
    metricsConfigData: {}
    # Arbitrary configuration data to append
    configData: {}
    # Arbitrary configuration to append
    # This is treated as a Go template and rendered with the root context
    configFile: ""
    # Use an existing config map (see secret-alpha.yaml for required fields)
    existingConfig: ~
    # Use an existing secret
    existingSecret: ~

  # -- Image registry
  image:
    repository: "quay.io/oauth2-proxy/oauth2-proxy"
    # appVersion is used by default
    tag: ""
    pullPolicy: "IfNotPresent"

  # Optionally specify an array of imagePullSecrets.
  # Secrets must be manually created in the namespace.
  # Ref: https://kubernetes.io/docs/concepts/containers/images/#specifying-imagepullsecrets-on-a-pod
  # imagePullSecrets:
  # - name: myRegistryKeySecretName

  # Set a custom containerPort if required.
  # This will default to 4180 if this value is not set and the httpScheme set to http
  # This will default to 4443 if this value is not set and the httpScheme set to https
  # containerPort: 4180

  # -- Extra arguments
  extraArgs: {}

  # -- Extra enviroments
  extraEnv: []

  # -- Variables from file
  envFrom: []
  # Load environment variables from a ConfigMap(s) and/or Secret(s)
  # that already exists (created and managed by you).
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/#configure-all-key-value-pairs-in-a-configmap-as-container-environment-variables
  #
  # PS: Changes in these ConfigMaps or Secrets will not be automatically
  #     detected and you must manually restart the relevant Pods after changes.
  #
  #  - configMapRef:
  #      name: special-config
  #  - secretRef:
  #      name: special-config-secret

  # -- Custom labels to add into metadata
  customLabels: {}

  # -- To authorize individual email addresses
  # That is part of extraArgs but since this needs special treatment we need to do a separate section
  authenticatedEmailsFile:
    enabled: false
    # Defines how the email addresses file will be projected, via a configmap or secret
    persistence: configmap
    # template is the name of the configmap what contains the email user list but has been configured without this chart.
    # It's a simpler way to maintain only one configmap (user list) instead changing it for each oauth2-proxy service.
    # Be aware the value name in the extern config map in data needs to be named to "restricted_user_access" or to the
    # provided value in restrictedUserAccessKey field.
    template: ""
    # The configmap/secret key under which the list of email access is stored
    # Defaults to "restricted_user_access" if not filled-in, but can be overridden to allow flexibility
    restrictedUserAccessKey: ""
    # One email per line
    # example:
    # restricted_access: |-
    #   name1@domain
    #   name2@domain
    # If you override the config with restricted_access it will configure a user list within this chart what takes care of the
    # config map resource.
    restricted_access: ""
    annotations: {}
    # helm.sh/resource-policy: keep

  # -- Kubernetes service to expose Pod
  service:
    type: ClusterIP
    # when service.type is ClusterIP ...
    # clusterIP: 192.0.2.20
    # when service.type is LoadBalancer ...
    # loadBalancerIP: 198.51.100.40
    # loadBalancerSourceRanges: 203.0.113.0/24
    # when service.type is NodePort ...
    # nodePort: 80
    portNumber: 80
    # Protocol set on the service
    appProtocol: http
    annotations: {}
    # foo.io/bar: "true"
    # configure externalTrafficPolicy
    externalTrafficPolicy: ""
    # configure internalTrafficPolicy
    internalTrafficPolicy: ""

  # -- Create or use ServiceAccount
  serviceAccount:
    # -- Specifies whether a ServiceAccount should be created
    enabled: true
    # -- The name of the ServiceAccount to use.
    # -- If not set and create is true, a name is generated using the fullname template
    name:
    automountServiceAccountToken: true
    annotations: {}

  # -- Ingress configuration to expose app
  ingress:
    enabled: false
    # className: nginx
    path: /
    # Only used if API capabilities (networking.k8s.io/v1) allow it
    pathType: ImplementationSpecific
    # Used to create an Ingress record.
    # hosts:
    # - chart-example.local
    # Extra paths to prepend to every host configuration. This is useful when working with annotation based services.
    # Warning! The configuration is dependant on your current k8s API version capabilities (networking.k8s.io/v1)
    # extraPaths:
    # - path: /*
    #   pathType: ImplementationSpecific
    #   backend:
    #     service:
    #       name: ssl-redirect
    #       port:
    #         name: use-annotation
    labels: {}
    # annotations:
    #   kubernetes.io/ingress.class: nginx
    #   kubernetes.io/tls-acme: "true"
    # tls:
    # Secrets must be manually created in the namespace.
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

  # -- The resources limits and requested
  resources:
    {}
    # limits:
    #   cpu: 100m
    #   memory: 300Mi
    # requests:
    #   cpu: 100m
    #   memory: 300Mi

  # -- Extra volumes
  extraVolumes:
    []
    # - name: ca-bundle-cert
    #   secret:
    #     secretName: <secret-name>

  # -- Mount extra volumes
  extraVolumeMounts:
    []
    # - mountPath: /etc/ssl/certs/
    #   name: ca-bundle-cert

  # -- Additional containers to be added to the pod.
  extraContainers:
    []
    #  - name: my-sidecar
    #    image: nginx:latest

  # --  mportance of a Pod relative to other Pods.
  priorityClassName: ""

  # -- hostAliases is a list of aliases to be added to /etc/hosts for network name resolution
  hostAliases: []
  # - ip: "10.xxx.xxx.xxx"
  #   hostnames:
  #     - "auth.example.com"
  # - ip: 127.0.0.1
  #   hostnames:
  #     - chart-example.local
  #     - example.local

  # [TopologySpreadConstraints](https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/) configuration.
  # Ref: https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#scheduling
  # topologySpreadConstraints: []

  # -- Affinity for pod assignment
  # Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  # affinity: {}

  # -- Tolerations for pod assignment
  # Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  tolerations: []

  # -- Node labels for pod assignment
  # Ref: https://kubernetes.io/docs/user-guide/node-selection/
  nodeSelector: {}

  # -- Whether to use secrets instead of environment values for setting up OAUTH2_PROXY variables
  proxyVarsAsSecrets: true

  # -- Configure livenessProbe
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/
  # Disable both when deploying with Istio 1.0 mTLS. https://istio.io/help/faq/security/#k8s-health-checks
  livenessProbe:
    enabled: true
    initialDelaySeconds: 0
    timeoutSeconds: 1

  # -- Configure readinessProbe
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-startup-probes
  readinessProbe:
    enabled: true
    initialDelaySeconds: 0
    timeoutSeconds: 5
    periodSeconds: 10
    successThreshold: 1

  # -- Configure Kubernetes security context for container
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
  securityContext:
    enabled: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 2000
    runAsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  # -- Add Deployment annotations
  deploymentAnnotations: {}

  # -- Add Pod annotations
  podAnnotations: {}

  # -- Add Pod labels
  podLabels: {}

  # -- Number of replicas
  replicaCount: 1

  # -- Max save Helm release revision
  revisionHistoryLimit: 10

  # -- Configure strategy to update deployment
  # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
  strategy: {}

  # -- PodDisruptionBudget settings
  # Ref: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # -- Horizontal Pod Autoscaling
  # Ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    #  targetMemoryUtilizationPercentage: 80
    annotations: {}

  # -- Configure Kubernetes security context for pod
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
  podSecurityContext: {}

  # -- Whether to use http or https
  httpScheme: http

  # -- Configure initContainers
  initContainers:
    # if the redis sub-chart is enabled, wait for it to be ready
    # before starting the proxy
    # creates a role binding to get, list, watch, the redis master pod
    # if service account is enabled
    waitForRedis:
      enabled: true
      image:
        repository: "alpine"
        tag: "latest"
        pullPolicy: "IfNotPresent"
      # uses the kubernetes version of the cluster
      # the chart is deployed on, if not set
      kubectlVersion: ""
      securityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      timeout: 180
      resources:
        {}
        # limits:
        #   cpu: 100m
        #   memory: 300Mi
        # requests:
        #   cpu: 100m
        #   memory: 300Mi

  # -- Additionally authenticate against a htpasswd file. Entries must be created with "htpasswd -B" for bcrypt encryption.
  # Alternatively supply an existing secret which contains the required information.
  htpasswdFile:
    enabled: false
    existingSecret: ""
    entries: []
    # One row for each user
    # example:
    # entries:
    #  - testuser:$2y$05$gY6dgXqjuzFhwdhsiFe7seM9q9Tile4Y3E.CBpAZJffkeiLaC21Gy

  # -- Configure the session storage type, between cookie and redis
  sessionStorage:
    # Can be one of the supported session storage cookie|redis
    type: cookie
    redis:
      # Name of the Kubernetes secret containing the redis & redis sentinel password values (see also `sessionStorage.redis.passwordKey`)
      existingSecret: ""
      # Redis password value. Applicable for all Redis configurations. Taken from redis subchart secret if not set. `sessionStorage.redis.existingSecret` takes precedence
      password: ""
      # Key of the Kubernetes secret data containing the redis password value
      passwordKey: "redis-password"
      # Can be one of standalone|cluster|sentinel
      clientType: "standalone"
      standalone:
        # URL of redis standalone server for redis session storage (e.g. `redis://HOST[:PORT]`). Automatically generated if not set
        connectionUrl: ""
      cluster:
        # List of Redis cluster connection URLs (e.g. `["redis://127.0.0.1:8000", "redis://127.0.0.1:8000"]`)
        connectionUrls: []
      sentinel:
        # Name of the Kubernetes secret containing the redis sentinel password value (see also `sessionStorage.redis.sentinel.passwordKey`). Default: `sessionStorage.redis.existingSecret`
        existingSecret: ""
        # Redis sentinel password. Used only for sentinel connection; any redis node passwords need to use `sessionStorage.redis.password`
        password: ""
        # Key of the Kubernetes secret data containing the redis sentinel password value
        passwordKey: "redis-sentinel-password"
        # Redis sentinel master name
        masterName: ""
        # List of Redis sentinel connection URLs (e.g. `["redis://127.0.0.1:8000", "redis://127.0.0.1:8000"]`)
        connectionUrls: []

  # -- Enables and configure the automatic deployment of the redis subchart
  redis:
    # provision an instance of the redis sub-chart
    enabled: false
    # Redis specific helm chart settings, please see:
    # https://github.com/bitnami/charts/tree/master/bitnami/redis#parameters
    # redisPort: 6379
    # architecture: standalone

  # -- Enables apiVersion deprecation checks
  checkDeprecation: true

  # Allows graceful shutdown
  # terminationGracePeriodSeconds: 65
  # lifecycle:
