{{- /*
  Powerpipe provides dashboards, benchmarks, and compliance checks on top of Steampipe.
  It connects to Steampipe's PostgreSQL endpoint as its data source.
  Requires bbdd.enabled=true so the PostgreSQL service exists.
*/}}
{{- if .Values.powerpipe.enabled }}
{{- if not .Values.bbdd.enabled }}
  {{- fail "powerpipe.enabled=true requires bbdd.enabled=true. Powerpipe connects to Steampipe's PostgreSQL endpoint." }}
{{- end }}
{{- if ne (.Values.bbdd.listen | default "local") "network" }}
  {{- fail "powerpipe.enabled=true requires bbdd.listen=\"network\". Powerpipe runs in a separate pod and cannot reach Steampipe on localhost." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "steampipe.powerpipe.fullname" . }}
  labels:
    {{- include "steampipe.powerpipe.labels" . | nindent 4 }}
  {{- with .Values.powerpipe.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.powerpipe.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "steampipe.powerpipe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.powerpipe.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "steampipe.powerpipe.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.powerpipe.mods }}
      initContainers:
        - name: mod-install
          image: "{{ .Values.powerpipe.image.repository }}:{{ .Values.powerpipe.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.powerpipe.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.powerpipe.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - |
              set -e
              cd /workspace
              echo "Installing Powerpipe mods..."
              {{- range .Values.powerpipe.mods }}
              powerpipe mod install {{ . }}
              {{- end }}
              echo "Mod installation complete."
          volumeMounts:
            - name: powerpipe-workspace
              mountPath: /workspace
      {{- end }}
      containers:
        - name: powerpipe
          image: "{{ .Values.powerpipe.image.repository }}:{{ .Values.powerpipe.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.powerpipe.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.powerpipe.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - |
              {{- if .Values.powerpipe.mods }}
              cd /workspace
              {{- end }}
              export POWERPIPE_DATABASE="postgres://steampipe:${STEAMPIPE_DATABASE_PASSWORD:-steampipe}@{{ include "steampipe.fullname" . }}-psql:{{ .Values.bbdd.port }}/steampipe"
              exec powerpipe server \
                --listen {{ .Values.powerpipe.listen | default "network" }} \
                --port {{ .Values.powerpipe.port | default 9033 }}
          env:
            {{- if .Values.powerpipe.env }}
            {{- toYaml .Values.powerpipe.env | nindent 12 }}
            {{- end }}
          {{- if .Values.powerpipe.envFrom }}
          envFrom:
            {{- toYaml .Values.powerpipe.envFrom | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.powerpipe.port | default 9033 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            {{- toYaml .Values.powerpipe.resources | nindent 12 }}
          {{- if .Values.powerpipe.mods }}
          volumeMounts:
            - name: powerpipe-workspace
              mountPath: /workspace
          {{- end }}
          {{- with .Values.powerpipe.extraVolumeMount }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.powerpipe.serviceAccount.name | default (include "steampipe.serviceAccountName" .) }}
      {{- with .Values.powerpipe.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.powerpipe.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.powerpipe.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.powerpipe.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if .Values.powerpipe.mods }}
        - name: powerpipe-workspace
          emptyDir: {}
      {{- end }}
      {{- with .Values.powerpipe.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
