suite: service account tests
templates:
  - templates/serviceaccount.yaml

tests:
  - it: should create a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-steampipe

  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom service account name when provided
    set:
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: should add annotations to ServiceAccount
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/steampipe-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/steampipe-role

  - it: should not automount service account token by default
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should enable automounting when configured
    set:
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
